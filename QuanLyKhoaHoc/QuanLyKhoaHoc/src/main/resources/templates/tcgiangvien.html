<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Trang Chủ Giảng Viên</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">
			<a th:href="@{/TrangChuGiangVien}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="border-color: rgba(255, 255, 255, 0.35); width: 200px">
				TEACHER PORTAL </a>


			<div class="flex-grow-1"></div>
			<div class="px-3 small">
				<span th:if="${session.gv != null}">Xin chào <strong
					th:text="${session.gv.tenGV}"></strong></span> <a href="/DangXuatGV"
					class="btn btn-sm btn-outline-light ms-2 border-0"> <i
					class="bi bi-box-arrow-right"></i> Đăng xuất
				</a>
			</div>
		</div>
	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a th:href="@{/ThongTinGiangVien}" class="text-decoration-none">Thông
						tin cá nhân</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLichDay}" class="text-decoration-none">Quản
						lý lịch dạy</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLopDay}" class="text-decoration-none">Quản
						lý lớp dạy</a>
				</div>

				<div class="mb-2">
					<a class="text-decoration-none text-danger"
						style="cursor: pointer;">Đăng xuất</a>
				</div>
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="flex-grow-1 p-4">

				<h5>Lớp dạy tuần này</h5>

				<!-- Nếu danh sách có dữ liệu -->
				<div th:if="${!#lists.isEmpty(ds)}">

					<!-- Header bảng -->
					<div class="row fw-bold border-bottom py-2 bg-light">
						<div class="col-2">Mã Lớp</div>
						<div class="col-4">Tên Lớp</div>
						<div class="col-6">Lịch Học</div>
					</div>

					<!-- Danh sách lớp -->
					<div th:each="lop : ${ds}" class="row border-bottom py-2">
						<div class="col-2" th:text="${lop.maLop}"></div>
						<div class="col-4" th:text="${lop.tenLop}"></div>
						<div class="col-6" th:utext="${lop.lichHocStr}"></div>
					</div>
				</div>

				<!-- Nếu danh sách rỗng -->
				<div th:if="${#lists.isEmpty(ds)}"
					class="py-3 text-muted fst-italic">Chưa có lớp nào trong tuần
					này.</div>

			</section>


		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
