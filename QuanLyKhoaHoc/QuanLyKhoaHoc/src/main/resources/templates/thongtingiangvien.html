<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thông Tin Giảng Viên</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">
			<a th:href="@{/TrangChuGiangVien}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="border-color: rgba(255, 255, 255, 0.35); width: 200px"> TEACHER PORTAL
			</a>


			<div class="flex-grow-1"></div>
			<div class="px-3 small">
				<span th:if="${session.gv != null}">Xin chào <strong
					th:text="${session.gv.tenGV}"></strong></span> <a href="/DangXuatGV"
					class="btn btn-sm btn-outline-light ms-2 border-0"> <i
					class="bi bi-box-arrow-right"></i> Đăng xuất
				</a>
			</div>
		</div>
	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a th:href="@{/ThongTinGiangVien}" class="text-decoration-none">Thông
						tin cá nhân</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLichDay}" class="text-decoration-none">Quản
						lý lịch dạy</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLopDay}" class="text-decoration-none">Quản
						lý lớp dạy</a>
				</div>

				<div class="mb-2">
					<a class="text-decoration-none text-danger"
						style="cursor: pointer;">Đăng xuất</a>
				</div>
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="col p-4">
				<h5 class="mb-3">Thông tin giảng viên</h5>

				<p th:if="${tb != null}" th:text="${tb}"
					class="text-success fw-bold"></p>

				<form th:action="@{/ThongTinGiangVien}" method="post"
					class="row g-3">

					<!-- Mã GV (chỉ xem) -->
					<div class="col-md-3">
						<label class="form-label small">Mã giảng viên</label> <input
							type="text" th:value="${gv.maGV}"
							class="form-control form-control-sm" disabled>

					</div>

					<div class="col-md-5">
						<label class="form-label small">Tên giảng viên</label> <input
							type="text" name="tenGV" th:value="${gv.tenGV}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-4">
						<label class="form-label small">Email</label> <input type="email"
							name="email" th:value="${gv.email}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small">Số điện thoại</label> <input
							type="text" name="sdt" th:value="${gv.sdt}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small">Mật khẩu</label> <input
							type="password" name="pass" th:value="${gv.pass}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-4">
						<label class="form-label small">Chuyên ngành</label> <input
							type="text" name="chuyenNganh" th:value="${gv.chuyenNganh}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-12">
						<button type="submit" class="btn btn-primary btn-sm">Cập
							nhật thông tin</button>
					</div>

				</form>


			</section>

		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
