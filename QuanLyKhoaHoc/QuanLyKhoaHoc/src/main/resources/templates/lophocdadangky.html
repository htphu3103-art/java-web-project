<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lớp Học Đã Đăng Ký</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChu}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="width: 200px;"> STUDENT OFFICE </a>
				<a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanHocPhi}"> Thanh toán học phí</a>


			<div class="flex-grow-1"></div>

			<div class="px-3 small d-flex align-items-center">
				<span th:if="${session.hv != null}"> Xin chào <strong
					th:text="${session.hv.hoTen}"></strong>
				</span> <a href="/DangXuatHV"
					class="btn btn-sm btn-outline-light ms-3 border-0"> Đăng xuất </a>
			</div>

		</div>
	</header>


	<!-- ===== MAIN ===== -->
	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex" style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3" style="width: 200px;">
				<h6 class="mb-3 fw-bold">Hoc viên</h6>

				<div class="mb-2">
					<a th:href="@{/ThongTinHocVien}" class="text-decoration-none">
						Thông tin học viên </a>
				</div>

				<div class="mb-2">
					<a th:href="@{/DanhSachKhoaHoc}" class="text-decoration-none">
						Đăng ký Học Phần </a>
				</div>
				<div class="mb-2">
					<a th:href="@{/LopHocDaDangKy}" class="text-decoration-none">
						Lớp Học Đã Đăng Ký </a>
				</div>
				<div class="mb-2">
					<a href="/DangXuat" class="text-decoration-none text-danger">
						Đăng xuất </a>
				</div>
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="flex-grow-1 p-4">
				<h4 class="mb-3">Danh sách lớp học</h4>
				<div th:if="${tb != null}"
					style="color: green; font-weight: bold; margin-bottom: 15px;"
					th:text="${tb}"></div>
				<div th:if="${!#lists.isEmpty(ds)}">

					<!-- ===== HEADER ===== -->
					<div class="row fw-bold border-bottom py-2">
						<div class="col-3">Tên lớp</div>
						<div class="col-3">Lịch học</div>
						<div class="col-3">Giảng viên</div>
						<div class="col-2 text-center">Thanh toán</div>
						<div class="col-1 text-center">Chi tiết</div>
					</div>



					<!-- ===== DATA ===== -->
					<div class="row py-2 border-bottom align-items-center"
						th:each="lh : ${ds}">

						<div class="col-3" th:text="${lh.tenLop}"></div>
						<div class="col-3" th:utext="${lh.lichHoc}"></div>
						<div class="col-3" th:text="${lh.tenGV}"></div>

						<div class="col-2 text-center">
							<span th:if="${lh.trangThaiHocPhi == 1}" class="badge bg-success">
								Đã thanh toán </span> <span th:if="${lh.trangThaiHocPhi == 0}"
								class="badge bg-warning text-dark"> Chưa thanh toán </span> <span
								th:if="${lh.trangThaiHocPhi == 2}"
								class="badge bg-info text-dark"> Chờ xử lý </span>
						</div>

						<div class="col-1 text-center">
							<a th:href="@{/ThongTinLopHoc/{maLop}(maLop=${lh.maLop})}"
								class="btn btn-outline-primary btn-sm"> Xem </a>
						</div>
					</div>


				</div>

				<!-- Khi không có dữ liệu -->
				<div th:if="${#lists.isEmpty(ds)}" class="text-muted fst-italic">Không
					có lớp học nào</div>

			</section>

		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
