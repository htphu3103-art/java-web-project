<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thông tin học viên</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
<header class="container-fluid px-0 text-white"
		style="background-color: #003865; height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChu}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="width: 200px;"> STUDENT OFFICE </a> <a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanHocPhi}"> Thanh toán học phí</a>


		<div class="flex-grow-1"></div>

		<div class="px-3 small d-flex align-items-center">
			<span th:if="${session.hv != null}"> Xin chào <strong
				th:text="${session.hv.hoTen}"></strong>
			</span> <a href="/DangXuatHV"
				class="btn btn-sm btn-outline-light ms-3 border-0"> Đăng xuất </a>
		</div>

		</div>
	</header>



	<!-- ===== MAIN ===== -->
	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex" style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3"
            style="width: 200px;">
            <h6 class="mb-3 fw-bold">Hoc viên</h6>

            <div class="mb-2">
                <a th:href="@{/ThongTinHocVien}" class="text-decoration-none">
                    Thông tin học viên </a>
            </div>

            <div class="mb-2">
                <a th:href="@{/DanhSachKhoaHoc}" class="text-decoration-none">
                    Đăng ký Học Phần </a>
            </div>
            <div class="mb-2">
                <a th:href="@{/LopHocDaDangKy}" class="text-decoration-none">
                    Lớp Học Đã Đăng Ký </a>
            </div>
            <div class="mb-2">
                <a href="/DangXuat" class="text-decoration-none text-danger">
                    Đăng xuất </a>
            </div>
        </aside>




			<!-- ===== CONTENT ===== -->
			<section class="flex-grow-1 p-4">

				<h5 class="mb-3">Thông tin học viên</h5>

				<p th:if="${tb != null}" th:text="${tb}"
					class="text-success fw-bold"></p>

				<form th:action="@{/ThongTinHocVien}" method="post" class="row g-3">

					<!-- Mã HV (chỉ xem) -->
					<div class="col-md-3">
						<label class="form-label small">Mã học viên</label> <input
							type="text" th:value="${hv.maHV}"
							class="form-control form-control-sm" disabled>
					</div>

					<div class="col-md-5">
						<label class="form-label small">Họ tên</label> <input type="text"
							name="hoTen" th:value="${hv.hoTen}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-4">
						<label class="form-label small">Email</label> <input type="email"
							name="email" th:value="${hv.email}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-4">
						<label class="form-label small">Số điện thoại</label> <input
							type="text" name="sdt" th:value="${hv.sdt}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-4">
						<label class="form-label small">Mật khẩu</label> <input
							type="password" name="pass" th:value="${hv.pass}"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-12">
						<button type="submit" class="btn btn-primary btn-sm">Cập
							nhật thông tin</button>
					</div>

				</form>

			</section>
		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
