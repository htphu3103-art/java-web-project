<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Danh Sách Học Viên</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChuAdmin}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none"
				style="width: 200px; border-color: rgba(255, 255, 255, 0.4) !important;">
				STUDENT'S OFFICE </a> <a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanChoXuLy}">Xử lý các thanh toán</a>

		</div>

		<div class="flex-grow-1"></div>

		<div class="px-3 small">
			<span th:if="${session.ad != null}"> Xin chào <strong
				th:text="${session.ad.hoTen}"></strong>
			</span>
		</div>


	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a href="#" class="text-decoration-none">Thông tin cá nhân</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/QuanLyGiangVien}" class="text-decoration-none">Quản
						lý giảng viên</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/DanhSachKhoaHocAD}" class="text-decoration-none">Quản lý lớp học</a>
				</div>

			</aside>


			<!-- ===== CONTENT ===== -->
			<section class="col p-4">


				<div class="row fw-bold border-bottom py-2">
					<div class="col-1">STT</div>
					<div class="col-5">Họ tên</div>
					<div class="col-3">Ngày đăng ký</div>
					<div class="col-3">Học phí</div>
				</div>

				<div th:each="hv, stt : ${ds}"
					class="row align-items-center border-bottom py-2">

					<!-- STT -->
					<div class="col-1" th:text="${stt.count}"></div>

					<!-- Họ tên -->
					<div class="col-5" th:text="${hv.hoTen}"></div>

					<!-- Ngày đăng ký -->
					<div class="col-3"
						th:text="${#dates.format(hv.ngayDangKy,'dd/MM/yyyy')}"></div>

					<!-- Trạng thái học phí -->
					<div class="col-3">
						<span th:switch="${hv.trangThaiHocPhi}"> <span th:case="0"
							class="badge bg-danger"> Chưa thanh toán </span> <span
							th:case="1" class="badge bg-success"> Đã thanh toán </span> <span
							th:case="2" class="badge bg-warning text-dark"> Đang xử lý
						</span> <span th:case="*" class="badge bg-secondary"> Không xác
								định </span>
						</span>

					</div>
				</div>


			</section>



		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
