<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng Ký Học Viên</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

    <!-- HEADER (giữ nguyên như trang login) -->
    <header class="container-fluid px-0 text-white"
            style="background-color: #003865; height: 56px;">
        <div class="d-flex align-items-center h-100 px-3 fw-bold">
            HỌC VIÊN LOGIN
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="card p-5 shadow" style="width: 380px; min-height: 480px;">
            <h4 class="mb-4 text-center fw-bold text-primary">Đăng Ký Học Viên</h4>

            <!-- Thông báo thành công -->
            <p th:if="${param.success}"
               class="text-success fw-bold text-center mb-3">
               ✅ Đăng ký thành công! Vui lòng kiểm tra email để xác thực tài khoản.
            </p>

            <!-- Thông báo lỗi -->
            <p th:if="${tb}" th:text="${tb}"
               class="text-danger fw-bold text-center mb-3"></p>

            <form action="/DangKyHocVien" method="post">
                <div class="mb-3">
                    <label for="HoTen" class="form-label">Họ và Tên:</label>
                    <input type="text" class="form-control" id="HoTen" name="HoTen" maxlength="50"
                           placeholder="Nhập họ tên..." required>
                </div>

                <div class="mb-3">
                    <label for="SDT" class="form-label">Số Điện Thoại:</label>
                    <input type="tel" class="form-control" id="SDT" name="SDT" maxlength="50"
                           placeholder="Nhập số điện thoại..." required>
                </div>

                <div class="mb-3">
                    <label for="Email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="Email" name="Email" maxlength="50"
                           placeholder="example@mail.com" required>
                </div>

                <div class="mb-4">
                    <label for="Pass" class="form-label">Mật khẩu:</label>
                    <input type="password" class="form-control" id="Pass" name="Pass" maxlength="250"
                           placeholder="Nhập mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Đăng Ký</button>

                <p class="text-center small mb-0">
                    Bạn đã có tài khoản?
                    <a href="/DangNhap" class="text-decoration-none text-primary fw-semibold">Đăng nhập</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
