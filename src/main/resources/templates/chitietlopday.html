<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Chi tiết lớp dạy</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">
			<a th:href="@{/TrangChuGiangVien}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="border-color: rgba(255, 255, 255, 0.35); width: 200px"> TEACHER PORTAL
			</a>


			<div class="flex-grow-1"></div>
			<div class="px-3 small">
				<span th:if="${session.gv != null}">Xin chào <strong
					th:text="${session.gv.tenGV}"></strong></span> <a href="/DangXuatGV"
					class="btn btn-sm btn-outline-light ms-2 border-0"> <i
					class="bi bi-box-arrow-right"></i> Đăng xuất
				</a>
			</div>
		</div>
	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a href="#" class="text-decoration-none">Thông tin cá nhân</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLichDay}" class="text-decoration-none">Quản
						lý lịch dạy</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLopDay}" class="text-decoration-none">Quản
						lý lớp dạy</a>
				</div>

				<div class="mb-2">
					<a class="text-decoration-none text-danger"
						style="cursor: pointer;">Đăng xuất</a>
				</div>
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="col p-4">
				<h5 class="mb-4">Thông tin lớp học</h5>
				<a th:href="@{/DanhSachHocVien/{maLop}(maLop=${maLop})}" class="btn btn-outline-secondary btn-sm px-3"> Xem
					danh sách học viên</a>

				<div th:if="${lop == null}" class="text-danger fw-bold">Không
					tìm thấy thông tin lớp học!</div>

				<div th:if="${lop != null}" class="row">
					<div class="col-12">

						<div class="pb-3 mb-4">

							<div class="mb-4">

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Mã lớp:</div>
									<div class="col-9" th:text="${lop.maLop}"></div>
								</div>

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Tên lớp:</div>
									<div class="col-9" th:text="${lop.tenLop}"></div>
								</div>

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Mã khóa học:</div>
									<div class="col-9" th:text="${lop.maKH}"></div>
								</div>

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Ngày bắt đầu:</div>
									<div class="col-9"
										th:text="${#dates.format(lop.ngayBatDau, 'dd/MM/yyyy')}"></div>
								</div>

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Số tuần học:</div>
									<div class="col-9" th:text="${lop.soTuanHoc}"></div>
								</div>

								<div class="row py-2 border-bottom">
									<div class="col-3 fw-bold">Trạng thái:</div>
									<div class="col-9">
										<span th:if="${lop.trangThai}" class="text-success fw-bold">
											Hoạt động </span> <span th:if="${!lop.trangThai}"
											class="text-secondary"> Tạm dừng </span>
									</div>
								</div>

							</div>

							<form method="post">

								<div class="row mb-3">
									<div class="col-12">
										<label class="form-label fw-bold">Ghi chú</label>
										<textarea name="ghiChu" rows="5" class="form-control"
											th:text="${lop.ghiChu}"></textarea>
									</div>
								</div>

								<div class="row">
									<div class="col text-end">
										<button type="submit" class="btn btn-primary btn-sm">
											Lưu ghi chú</button>
										<a th:href="@{/QuanLyLopDay}"
											class="btn btn-secondary btn-sm ms-2"> Quay lại </a>
									</div>
								</div>

							</form>
						</div>




					</div>
				</div>
			</section>


		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
