<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Thanh Toán Chờ Xử Lý</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChuAdmin}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none"
				style="width: 200px; border-color: rgba(255, 255, 255, 0.4) !important;">
				STUDENT'S OFFICE </a> <a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanChoXuLy}">Xử lý các thanh toán</a>

		</div>

		<div class="flex-grow-1"></div>

		<div class="px-3 small">
			<span th:if="${session.ad != null}"> Xin chào <strong
				th:text="${session.ad.hoTen}"></strong>
			</span>
		</div>


	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a href="#" class="text-decoration-none">Thông tin cá nhân</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/QuanLyGiangVien}" class="text-decoration-none">Quản
						lý giảng viên</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/DanhSachKhoaHocAD}" class="text-decoration-none">Quản lý lớp học</a>
				</div>

			</aside>


			<section class="flex-grow-1 p-4">
				<div
					class="d-flex justify-content-between align-items-center mb-4 gap-3">
					<h4 class="m-0 text-primary fw-bold">Danh sách thanh toán</h4>

					<form th:action="@{/ThanhToanChoXuLy}" method="get"
						class="d-flex gap-2 flex-grow-1 justify-content-end align-items-center">

						<!-- Tìm kiếm theo tên/mã -->
						<div class="input-group" style="max-width: 300px;">
							<input type="text" name="key"
								class="form-control form-control-sm" placeholder="Tìm tên..."
								th:value="${key}">
							<button class="btn btn-primary btn-sm" type="submit">Tìm</button>
						</div>
					</form>

				</div>

				<div
					class="row fw-bold border-bottom py-2 bg-light align-items-center"
					style="font-size: 0.9rem;">
					<div class="col-2">Mã HĐ</div>
					<div class="col-2">Mã HV</div>
					<div class="col-3">Họ tên</div>
					<div class="col-3 text-center">Ngày thanh toán</div>
					<div class="col-2 text-center">Thao tác</div>
				</div>

				<div th:each="hd : ${ds}"
     class="row py-3 border-bottom align-items-center">

    <div class="col-2 fw-medium" th:text="${hd.maHD}"></div>

    <div class="col-2" th:text="${hd.maHV}"></div>

    <div class="col-3" th:text="${hd.hoTen}"></div>

    <div class="col-3 text-center text-muted"
         th:text="${hd.ngayThanhToan != null
            ? #dates.format(hd.ngayThanhToan,'dd/MM/yyyy HH:mm')
            : 'Chưa thanh toán'}">
    </div>

    <!-- THAO TÁC -->
    <div class="col-2">
        <div class="d-flex justify-content-center gap-1">

            <!-- Xem -->
            <a th:href="@{/ChiTietThanhToan/{maHD}(maHD=${hd.maHD})}"
               class="btn btn-outline-primary btn-sm">
                Xem
            </a>

            <form th:action="@{/XuLyThanhToanCho}" method="post">

                <button type="submit"
                        name="action"
                        th:value="'duyet_' + ${hd.maHD}"
                        class="btn btn-success btn-sm">
                    Duyệt
                </button>
            </form>

          <form th:action="@{/XuLyThanhToanCho}" method="post">

    <button type="submit"
            name="action"
            th:value="'xoa_' + ${hd.maHD}"
            class="btn btn-outline-danger btn-sm">
        Xóa
    </button>

</form>


        </div>
    </div>
</div>



				<div th:if="${#lists.isEmpty(ds)}"
					class="py-5 text-center border mt-2 bg-white">
					<p class="text-muted mb-0">Không tìm thấy kết quả nào phù hợp.</p>
					<a th:href="@{/ThanhToanChoXuLy}" class="btn btn-link btn-sm">Xem
						tất cả</a>
				</div>
			</section>


		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
