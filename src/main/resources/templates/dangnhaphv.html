<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng Nhập Học Viên</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

	<!-- HEADER -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; height: 56px;">
		<div class="d-flex align-items-center h-100 px-3 fw-bold">HỌC
			VIÊN LOGIN</div>
	</header>

	<!-- MAIN CONTENT -->
	<main
		class="flex-grow-1 d-flex justify-content-center align-items-center">
		<div class="card p-5 shadow" style="width: 380px; height: 420px">
			<h4 class="mb-4 text-center fw-bold text-primary">Đăng Nhập Học
				Viên</h4>

			<!-- Thông báo -->
			<p th:if="${tb != null and tb != ''}" th:text="${tb}"
				class="text-success fw-bold text-center mb-4"></p>

			<form action="DangNhap" method="post">
				<div class="mb-3">
					<label for="txtEmail" class="form-label">Email:</label> <input
						type="text" class="form-control" id="txtEmail" name="txtEmail"
						required>
				</div>

				<div class="mb-4">
					<label for="txtPass" class="form-label">Mật khẩu:</label> <input
						type="password" class="form-control" id="txtPass" name="txtPass"
						required>
				</div>

				<button type="submit" class="btn btn-primary w-100 fw-bold">Đăng
					nhập</button>
				<p class="text-center mt-3 mb-0 small">
					Bạn chưa có tài khoản? <a href="/DangKyHocVien"
						class="text-decoration-none text-primary fw-semibold">Đăng ký</a>
				</p>

			</form>
		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
