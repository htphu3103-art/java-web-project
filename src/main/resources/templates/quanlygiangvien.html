<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý giảng viên</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChuAdmin}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none"
				style="width: 200px; border-color: rgba(255, 255, 255, 0.4) !important;">
				STUDENT'S OFFICE </a> <a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanChoXuLy}">Xử lý các thanh toán</a>

		</div>

		<div class="flex-grow-1"></div>

		<div class="px-3 small">
			<span th:if="${session.ad != null}"> Xin chào <strong
				th:text="${session.ad.hoTen}"></strong>
			</span>
		</div>


	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a href="#" class="text-decoration-none">Thông tin cá nhân</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/QuanLyGiangVien}" class="text-decoration-none">Quản
						lý giảng viên</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/DanhSachKhoaHocAD}" class="text-decoration-none">Quản lý lớp học</a>
				</div>
				
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="col p-4">


				<!-- THÔNG BÁO -->
				<p th:if="${tb != null and tb != ''}" th:text="${tb}"
					class="text-success fw-bold"></p>

				<!-- FORM THÊM GIẢNG VIÊN -->
				<form th:action="@{/QuanLyGiangVien}" method="post"
					class="row g-2 align-items-end mb-3">

					<div class="col-md-2">
						<label class="form-label small">Tên GV</label> <input type="text"
							name="txtTenGV" class="form-control form-control-sm" required>
					</div>

					<div class="col-md-2">
						<label class="form-label small">Email</label> <input type="email"
							name="txtEmail" class="form-control form-control-sm" required>
					</div>

					<div class="col-md-1">
						<label class="form-label small">SĐT</label> <input type="text"
							name="txtSDT" class="form-control form-control-sm" required>
					</div>

					<div class="col-md-2">
						<label class="form-label small">Mật khẩu</label> <input
							type="password" name="txtPass"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small">Chuyên ngành</label> <input
							type="text" name="txtChuyenNganh"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-2">
						<button type="submit" name="action" value="them"
							class="btn btn-success btn-sm w-100">Thêm giảng viên</button>
					</div>
				</form>


				<hr>

				<!-- DANH SÁCH GIẢNG VIÊN -->
				<h5>Danh sách giảng viên</h5>

				<p th:if="${#lists.isEmpty(ds)}" class="text-danger">Danh sách
					giảng viên trống!!!</p>
				<form th:action="@{/QuanLyGiangVien}" method="post">
					<div th:if="${!#lists.isEmpty(ds)}">

						<div class="row fw-bold border-bottom py-2">
							<div class="col-1">Mã</div>
							<div class="col-2">Tên GV</div>
							<div class="col-3">Email</div>
							<div class="col-2">SĐT</div>
							<div class="col-3">Chuyên ngành</div>
							<div class="col-1">Thao tác</div>
						</div>

						<div class="row py-2 border-bottom align-items-center"
							th:each="gv : ${ds}">
							<div class="col-1" th:text="${gv.maGV}"></div>
							<div class="col-2" th:text="${gv.tenGV}"></div>
							<div class="col-3" th:text="${gv.email}"></div>
							<div class="col-2" th:text="${gv.sdt}"></div>
							<div class="col-3" th:text="${gv.chuyenNganh}"></div>
							<div class="col-1">
								<div class="d-flex gap-1">
									<button type="submit" name="action"
										th:value="'xoa_' + ${gv.maGV}"
										class="btn btn-outline-danger btn-sm px-2 py-0">Xóa</button>
								</div>
							</div>

						</div>

					</div>
				</form>
			</section>
		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
