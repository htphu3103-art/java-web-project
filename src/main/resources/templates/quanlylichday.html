<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý lịch dạy</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">
			<a th:href="@{/TrangChuGiangVien}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none link-light"
				style="border-color: rgba(255, 255, 255, 0.35); width: 200px"> TEACHER PORTAL
			</a>


			<div class="flex-grow-1"></div>
			<div class="px-3 small">
				<span th:if="${session.gv != null}">Xin chào <strong
					th:text="${session.gv.tenGV}"></strong></span> <a href="/DangXuatGV"
					class="btn btn-sm btn-outline-light ms-2 border-0"> <i
					class="bi bi-box-arrow-right"></i> Đăng xuất
				</a>
			</div>
		</div>
	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<!-- ===== SIDEBAR ===== -->
			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a th:href="@{/ThongTinGiangVien}" class="text-decoration-none">Thông
						tin cá nhân</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLichDay}" class="text-decoration-none">Quản
						lý lịch dạy</a>
				</div>

				<div class="mb-2">
					<a th:href="@{/QuanLyLopDay}" class="text-decoration-none">Quản
						lý lớp dạy</a>
				</div>

				<div class="mb-2">
					<a class="text-decoration-none text-danger"
						style="cursor: pointer;">Đăng xuất</a>
				</div>
			</aside>

			<!-- ===== CONTENT ===== -->
			<section class="col p-4">

				<!-- THÔNG BÁO -->
				<p th:if="${tb != null and tb != ''}" th:text="${tb}"
					class="text-danger fw-bold"></p>

				<!-- FORM THÊM LỊCH DẠY -->
				<h5 class="mb-3">Tạo lớp học</h5>

				<form th:action="@{/QuanLyLichDay}" method="post"
					class="row g-3 mb-4">

					<!-- HÀNG 1 -->
					<div class="col-md-4">
						<label class="form-label small fw-bold">Tên lớp</label> <input
							type="text" name="tenLop" class="form-control form-control-sm"
							required>
					</div>

					<div class="col-md-3">
						<label class="form-label small fw-bold">Khóa học</label> <select
							name="maKH" class="form-select form-select-sm" required>
							<option value="" disabled selected>-- Chọn khóa học --</option>
							<option th:each="kh : ${dsKH}" th:value="${kh.maKH}"
								th:text="${kh.tenKH}"></option>
						</select>
					</div>

					<div class="col-md-2">
						<label class="form-label small fw-bold">Số tuần</label> <input
							type="number" name="soTuanHoc" min="1"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small fw-bold">Ngày bắt đầu</label> <input
							type="date" name="ngayBatDau"
							class="form-control form-control-sm" required>
					</div>

					<!-- HÀNG 2 -->
					<div class="col-md-3">
						<label class="form-label small fw-bold">Giờ bắt đầu</label> <input
							type="time" name="gioBatDau" class="form-control form-control-sm"
							required>
					</div>

					<div class="col-md-3">
						<label class="form-label small fw-bold">Giờ kết thúc</label> <input
							type="time" name="gioKetThuc"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small fw-bold">Học phí</label> <input
							type="number" name="hocPhi" min="0" step="1000"
							class="form-control form-control-sm" required>
					</div>

					<div class="col-md-3">
						<label class="form-label small fw-bold">Ghi chú</label>
						<textarea name="ghiChu" rows="2"
							class="form-control form-control-sm"></textarea>
					</div>

					<!-- NÚT -->
					<div class="col-12 text-end">
						<button type="submit" class="btn btn-primary btn-sm px-4">Tạo
							lớp</button>
					</div>

				</form>

				<hr>

				<h5 class="mb-3">Danh sách lớp học đã đăng ký</h5>

				<p th:if="${#lists.isEmpty(dsLop)}" class="text-danger">Chưa có
					lớp học nào!</p>

				<div th:if="${!#lists.isEmpty(dsLop)}">

					<!-- HEADER -->
					<div class="row fw-bold border-bottom py-2 text-muted small">
						<div class="col-2">Tên lớp</div>
						<div class="col-2">Ngày bắt đầu</div>
						<div class="col-1 text-center">Tuần</div>
						<div class="col-2">Khóa học</div>
						<div class="col-2">Học phí</div>
						<div class="col-1">Trạng thái</div>
						<div class="col-2 text-end">Thao tác</div>
					</div>

					<form action="QuanLyLichDay" method="post">
						<div th:each="lop : ${dsLop}"
							class="row align-items-center py-2 border-bottom hover-row">

							<div class="col-2" th:text="${lop.tenLop}"></div>
							<div class="col-2"
								th:text="${#dates.format(lop.ngayBatDau, 'dd/MM/yyyy')}"></div>
							<div class="col-1 text-center" th:text="${lop.soTuanHoc}"></div>
							<div class="col-2" th:text="${lop.maKH}"></div>
							<div class="col-2" th:text="${lop.hocPhi} + ' đ'"></div>


							<div class="col-1">
								<span th:if="${lop.trangThai}" class="badge bg-success">Hoạt
									động</span> <span th:if="${!lop.trangThai}" class="badge bg-secondary">Tạm
									dừng</span>
							</div>

							<div class="col-2 text-end d-flex justify-content-end gap-2">
								<a th:href="@{/ChiTietLichDay/{maLop}(maLop=${lop.maLop})}"
									class="btn btn-info btn-sm text-white">Xem</a>
								<button type="submit" name="action"
									th:value="'xoa_' + ${lop.maLop}" class="btn btn-danger btn-sm">Xóa</button>
							</div>

						</div>
					</form>
				</div>

			</section>

		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
