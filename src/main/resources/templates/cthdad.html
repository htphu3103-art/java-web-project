<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Trang Chủ Admin</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

	<!-- ===== HEADER ===== -->
	<header class="container-fluid px-0 text-white"
		style="background-color: #003865; border-bottom: 1px solid rgba(255, 255, 255, 0.35); height: 56px;">
		<div class="d-flex align-items-center h-100">

			<a th:href="@{/TrangChuAdmin}"
				class="fw-bold border-end h-100 d-flex align-items-center px-3 text-white text-decoration-none"
				style="width: 200px; border-color: rgba(255, 255, 255, 0.4) !important;">
				STUDENT'S OFFICE </a> <a
				class="nav-link text-white px-3 h-100 d-flex align-items-center border-end"
				th:href="@{/ThanhToanChoXuLy}">Xử lý các thanh toán</a>

		</div>

		<div class="flex-grow-1"></div>

		<div class="px-3 small">
			<span th:if="${session.ad != null}"> Xin chào <strong
				th:text="${session.ad.hoTen}"></strong>
			</span>
		</div>


	</header>

	<main class="container-fluid px-0 flex-grow-1">
		<div class="d-flex align-items-stretch"
			style="min-height: calc(100vh - 56px);">

			<aside class="bg-light border-end p-3"
				style="width: 200px; flex-shrink: 0;">

				<div class="mb-2">
					<a href="#" class="text-decoration-none">Thông tin cá nhân</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/QuanLyGiangVien}" class="text-decoration-none">Quản
						lý giảng viên</a>
				</div>
				<div class="mb-2">
					<a th:href="@{/DanhSachKhoaHocAD}" class="text-decoration-none">Quản lý lớp học</a>
				</div>

			</aside>

			<!-- CONTENT -->
			<section class="flex-grow-1 p-4">

				<h4 class="fw-bold mb-4">Lịch sử đóng học phí</h4>

				<!-- TABLE HEADER -->
				<div class="row fw-bold border-bottom pb-2 mb-2">
					<div class="col-2">Mã lớp</div>
					<div class="col-3">Tên lớp</div>
					<div class="col-2 text-end">Học phí</div>
					<div class="col-3">Ngày đóng</div>
					<div class="col-1 text-center">TT</div>
					<div class="col-1 text-center">Thao tác</div>
				</div>

				<!-- TABLE DATA -->
				<div th:each="dk : ${ds}"
					class="row py-2 border-bottom align-items-center">

					<div class="col-2" th:text="${dk.maLop}"></div>

					<div class="col-3" th:text="${dk.tenLop}"></div>

					<div class="col-2 text-end"
						th:text="${#numbers.formatDecimal(dk.hocPhi,0,'POINT',0,'POINT')} + ' đ'">
					</div>

					<div class="col-3"
						th:text="${dk.ngayDongHocPhi != null
                   ? #dates.format(dk.ngayDongHocPhi,'dd/MM/yyyy HH:mm')
                   : '—'}">
					</div>

					<!-- TRẠNG THÁI (GIỮ NGUYÊN) -->
					<div class="col-1 text-center">
						<span th:if="${dk.trangThai == 1}" class="badge bg-success">
							Đã đóng </span> <span th:if="${dk.trangThai == 2}"
							class="badge bg-info text-dark"> Chờ xử lý </span> <span
							th:if="${dk.trangThai == 0}" class="badge bg-warning text-dark">
							Chưa đóng </span>
					</div>

					<!-- THAO TÁC (1 HÀNG – NHỎ) -->
					<div class="col-1 text-center">

						<div th:if="${dk.trangThai == 2}"
							class="d-flex justify-content-center gap-1">

							<!-- DUYỆT -->
							<form th:action="@{/ChiTietThanhToan/{maDK}(maDK=${dk.maDK})}"
								method="post" class="m-0">
								<button type="submit" name="action" value="duyet" class="btn btn-success btn-sm px-2 py-1"
									style="font-size: 0.75rem;">Duyệt</button>
							</form>

							<!-- XÓA -->
							<form th:action="@{/ChiTietThanhToan/{maDK}(maDK=${dk.maDK})}"
								method="post" class="m-0">
								<button type="submit" name="action" value="xoa"
									class="btn btn-outline-danger btn-sm px-2 py-1"
									style="font-size: 0.75rem;">Xóa</button>
							</form>

						</div>

						<span th:unless="${dk.trangThai == 2}" class="text-muted">—</span>
					</div>

				</div>


				<!-- EMPTY -->
				<div th:if="${ds == null || ds.isEmpty()}"
					class="text-center text-muted py-4">Chưa có dữ liệu đóng học
					phí</div>

			</section>

		</div>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
